services:
  - type: web
    name: smart-menu-api
    runtime: docker
    plan: free
    rootDir: backend
    dockerFilePath: Dockerfile
    dockerContext: .
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        sync: false # Provide in Render Dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: "7d"
      - key: ALLOWED_ORIGINS
        sync: false # Set to your Vercel URL
      - key: FRONTEND_URL
        sync: false # Set to your Vercel URL
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_EMAIL
        sync: false
    healthCheckPath: /api/health # Using the new health check endpoint
